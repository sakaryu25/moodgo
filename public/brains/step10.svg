<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
<style>
  .b{animation:dance .45s ease-in-out infinite alternate;transform-origin:100px 126px;transform-box:fill-box}
  .bl{animation:radiate .45s ease-in-out infinite alternate;transform-origin:32px 58px;transform-box:fill-box}
  .s1{animation:fly 1.2s ease-in-out infinite 0s}
  .s2{animation:fly 1.2s ease-in-out infinite .3s}
  .s3{animation:fly 1.2s ease-in-out infinite .6s}
  @keyframes dance{0%{transform:rotate(-10deg)}100%{transform:rotate(10deg)}}
  @keyframes radiate{0%{transform:scale(.9);opacity:.75}100%{transform:scale(1.12);opacity:1}}
  @keyframes fly{0%{transform:translate(0,0);opacity:1}100%{transform:translate(-8px,-24px);opacity:0}}
</style>
<g class="s1"><text x="18" y="62" font-size="14" fill="#FFD700">★</text></g>
<g class="s2"><text x="168" y="76" font-size="11" fill="#FFD700">★</text></g>
<g class="s3"><text x="8"  y="44" font-size="9"  fill="#FF9AB0">✦</text></g>
<text x="174" y="48" font-size="9" fill="#FFD700" opacity=".7">✦</text>
