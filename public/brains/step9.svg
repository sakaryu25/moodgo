<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
<style>
  .b{animation:eureka .5s ease-in-out infinite alternate}
  .bl{animation:blaze .5s ease-in-out infinite alternate;transform-origin:100px 24px;transform-box:fill-box}
  .s1{animation:spark 1.4s ease-in-out infinite 0s}
  .s2{animation:spark 1.4s ease-in-out infinite .4s}
  .s3{animation:spark 1.4s ease-in-out infinite .8s}
  @keyframes eureka{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-12px) scale(1.04)}}
  @keyframes blaze{0%{transform:scale(.88);opacity:.7}100%{transform:scale(1.15);opacity:1}}
  @keyframes spark{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(0,-28px) scale(.2);opacity:0}}
</style>
