  @keyframes blink1{0%{transform:scale(.88);opacity:.7}100%{transform:scale(1.08);opacity:1}}
  @keyframes blink2{0%{transform:scale(1.06);opacity:1}100%{transform:scale(.9);opacity:.7}}
</style>
