<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 230" width="220" height="230">
  <defs>
    <!-- Wood handle gradient -->
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3d1a05"/>
      <stop offset="20%" style="stop-color:#7a3510"/>
      <stop offset="45%" style="stop-color:#c96820"/>
      <stop offset="65%" style="stop-color:#e07c28"/>
      <stop offset="82%" style="stop-color:#b05a18"/>
      <stop offset="100%" style="stop-color:#5a2508"/>
    </linearGradient>
    <!-- Metal connector -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8c8c8"/>
      <stop offset="30%" style="stop-color:#f0f0f0"/>
      <stop offset="55%" style="stop-color:#e0e0e0"/>
      <stop offset="80%" style="stop-color:#a8a8a8"/>
      <stop offset="100%" style="stop-color:#888"/>
    </linearGradient>
    <!-- Outer frame silver -->
    <linearGradient id="frameGrad" x1="15%" y1="5%" x2="85%" y2="95%">
      <stop offset="0%" style="stop-color:#e8e8e8"/>
      <stop offset="20%" style="stop-color:#c8c8c8"/>
      <stop offset="40%" style="stop-color:#909090"/>
      <stop offset="60%" style="stop-color:#787878"/>
      <stop offset="80%" style="stop-color:#b8b8b8"/>
      <stop offset="100%" style="stop-color:#d8d8d8"/>
    </linearGradient>
    <!-- Lens glass gradient -->
    <radialGradient id="lensGrad" cx="42%" cy="38%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="35%" style="stop-color:#edf6ff"/>
      <stop offset="70%" style="stop-color:#d0eaf8"/>
      <stop offset="100%" style="stop-color:#b8ddf0"/>
    </radialGradient>
    <!-- Lens edge tint -->
    <radialGradient id="lensEdgeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" style="stop-color:transparent"/>
      <stop offset="100%" style="stop-color:#a0ccee;stop-opacity:0.35"/>
    </radialGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- === HANDLE GROUP (rotated ~42deg) === -->
  <g transform="translate(40, 145) rotate(-42) translate(-40, -145)">
    <!-- Handle end cap -->
    <ellipse cx="40" cy="215" rx="13" ry="9" fill="#2a0e02" opacity="0.85"/>
    <!-- Handle body -->
    <rect x="27" y="145" width="26" height="70" rx="6" fill="url(#woodGrad)"/>
    <!-- Handle shine -->
    <rect x="31" y="148" width="8" height="62" rx="4" fill="#e09040" opacity="0.42"/>
    <rect x="33" y="150" width="3" height="50" rx="2" fill="white" opacity="0.18"/>
    <!-- Metal connector band -->
    <rect x="25" y="136" width="30" height="18" rx="5" fill="url(#metalGrad)"/>
    <rect x="28" y="138" width="12" height="5" rx="2.5" fill="white" opacity="0.55"/>
    <rect x="28" y="147" width="24" height="3" rx="1.5" fill="#888" opacity="0.4"/>
  </g>

  <!-- === OUTER FRAME (silver ring, thick) === -->
  <circle cx="105" cy="92" r="94" fill="url(#frameGrad)" filter="url(#shadow)"/>

  <!-- === DARK INNER BORDER (cartoon outline) === -->
  <circle cx="105" cy="92" r="90" fill="none" stroke="#1a1a1a" stroke-width="5"/>

  <!-- === SECONDARY SILVER INNER RING === -->
  <circle cx="105" cy="92" r="87" fill="none" stroke="#d0d0d0" stroke-width="2.5"/>
  <circle cx="105" cy="92" r="84" fill="none" stroke="#909090" stroke-width="1"/>

  <!-- === LENS GLASS === -->
  <circle cx="105" cy="92" r="82" fill="url(#lensGrad)"/>
  <circle cx="105" cy="92" r="82" fill="url(#lensEdgeGrad)"/>

  <!-- === GLASS REFLECTIONS (cartoon highlights) === -->
  <ellipse cx="79" cy="62" rx="22" ry="11" fill="white" opacity="0.58" transform="rotate(-30 79 62)"/>
  <ellipse cx="66" cy="73" rx="6" ry="3.5" fill="white" opacity="0.38" transform="rotate(-30 66 73)"/>
  <ellipse cx="138" cy="128" rx="12" ry="7" fill="#b8ddf0" opacity="0.28" transform="rotate(-30 138 128)"/>
</svg>
