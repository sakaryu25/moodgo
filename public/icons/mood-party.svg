<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="crackerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#cc3300"/>
    </linearGradient>
  </defs>
  <!-- Confetti pieces -->
  <rect x="20" y="18" width="14" height="10" rx="2" fill="#ff4d4d" transform="rotate(-30 27 23)"/>
  <rect x="50" y="10" width="10" height="14" rx="2" fill="#ffd700" transform="rotate(20 55 17)"/>
  <rect x="130" y="12" width="12" height="8" rx="2" fill="#4caf50" transform="rotate(15 136 16)"/>
  <rect x="160" y="25" width="10" height="14" rx="2" fill="#9c27b0" transform="rotate(-20 165 32)"/>
  <rect x="155" y="55" width="14" height="8" rx="2" fill="#2196f3" transform="rotate(40 162 59)"/>
  <rect x="25" y="55" width="8" height="12" rx="2" fill="#ff69b4" transform="rotate(-15 29 61)"/>
  <rect x="170" y="80" width="10" height="10" rx="2" fill="#ff9800" transform="rotate(25 175 85)"/>
  <rect x="10" y="90" width="12" height="8" rx="2" fill="#00bcd4" transform="rotate(-35 16 94)"/>
  <!-- Circles confetti -->
  <circle cx="40" cy="30" r="5" fill="#ff4444"/>
  <circle cx="165" cy="45" r="6" fill="#44ff44"/>
  <circle cx="180" cy="100" r="4" fill="#ffaa00"/>
  <circle cx="15" cy="130" r="5" fill="#aa44ff"/>

  <!-- Party popper body -->
  <path d="M55 160 L125 80" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round"/>
  <path d="M55 160 L125 80" stroke="url(#crackerGrad)" stroke-width="9" stroke-linecap="round"/>

  <!-- Popper cone body -->
  <path d="M42 175 L90 150 L80 125 L30 145 Z" fill="#1a1a1a"/>
  <path d="M44 173 L88 149 L79 127 L32 146 Z" fill="url(#crackerGrad)"/>
  <!-- Cone stripes -->
  <line x1="44" y1="173" x2="79" y2="127" stroke="#ff9955" stroke-width="3" opacity="0.6"/>
  <line x1="60" y1="170" x2="88" y2="134" stroke="#ff9955" stroke-width="3" opacity="0.6"/>

  <!-- Explosion burst from tip -->
  <circle cx="125" cy="80" r="28" fill="#ffd700" stroke="#1a1a1a" stroke-width="4"/>
  <circle cx="125" cy="80" r="25" fill="#ffec40"/>
  <!-- Star burst rays -->
  <g stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round">
    <line x1="125" y1="48" x2="125" y2="38"/>
    <line x1="125" y1="112" x2="125" y2="122"/>
    <line x1="93" y1="80" x2="83" y2="80"/>
    <line x1="157" y1="80" x2="167" y2="80"/>
    <line x1="103" y1="58" x2="96" y2="51"/>
    <line x1="147" y1="58" x2="154" y2="51"/>
    <line x1="103" y1="102" x2="96" y2="109"/>
    <line x1="147" y1="102" x2="154" y2="109"/>
  </g>
  <!-- Exclamation in burst -->
  <text x="125" y="88" font-family="Arial Black" font-size="26" font-weight="900" fill="#1a1a1a" text-anchor="middle">!</text>

  <!-- Stars scattered -->
  <g fill="#ffd700" stroke="#1a1a1a" stroke-width="1.5">
    <path d="M170 140 l4 12 l12 0 l-10 7 l4 12 l-10-7 l-10 7 l4-12 l-10-7 l12 0 Z" transform="scale(0.6) translate(115,80)"/>
    <path d="M170 140 l4 12 l12 0 l-10 7 l4 12 l-10-7 l-10 7 l4-12 l-10-7 l12 0 Z" transform="scale(0.5) translate(-80,160)"/>
  </g>
</svg>
