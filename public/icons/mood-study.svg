<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="book1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4488ee"/>
      <stop offset="100%" stop-color="#2255bb"/>
    </linearGradient>
    <linearGradient id="book2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ee5544"/>
      <stop offset="100%" stop-color="#bb2211"/>
    </linearGradient>
    <linearGradient id="book3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#44bb66"/>
      <stop offset="100%" stop-color="#228844"/>
    </linearGradient>
  </defs>

  <!-- Back book (blue) -->
  <rect x="62" y="55" width="88" height="115" rx="6" fill="#1a1a1a"/>
  <rect x="65" y="58" width="82" height="109" rx="5" fill="url(#book1Grad)"/>
  <!-- Spine -->
  <rect x="65" y="58" width="14" height="109" rx="4" fill="#2255bb"/>
  <line x1="79" y1="58" x2="79" y2="167" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Pages edge -->
  <rect x="141" y="60" width="5" height="105" rx="2" fill="#f5f0e0"/>
  <!-- Lines on cover -->
  <line x1="90" y1="90" x2="138" y2="90" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90" y1="102" x2="138" y2="102" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90" y1="114" x2="130" y2="114" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Middle book (red) leaning -->
  <g transform="rotate(-12 100 170)">
    <rect x="48" y="72" width="78" height="105" rx="6" fill="#1a1a1a"/>
    <rect x="51" y="75" width="72" height="99" rx="5" fill="url(#book2Grad)"/>
    <rect x="51" y="75" width="13" height="99" rx="4" fill="#bb2211"/>
    <line x1="64" y1="75" x2="64" y2="174" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="117" y="77" width="4" height="95" rx="2" fill="#f5f0e0"/>
    <line x1="76" y1="105" x2="116" y2="105" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="76" y1="117" x2="116" y2="117" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Front book (green) leaning other way -->
  <g transform="rotate(10 100 170)">
    <rect x="74" y="60" width="72" height="108" rx="6" fill="#1a1a1a"/>
    <rect x="77" y="63" width="66" height="102" rx="5" fill="url(#book3Grad)"/>
    <rect x="77" y="63" width="12" height="102" rx="4" fill="#228844"/>
    <line x1="89" y1="63" x2="89" y2="165" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="137" y="65" width="4" height="98" rx="2" fill="#f5f0e0"/>
    <line x1="100" y1="95" x2="134" y2="95" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="107" x2="134" y2="107" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="119" x2="128" y2="119" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Pencil -->
  <g transform="rotate(35 155 45)">
    <rect x="148" y="20" width="14" height="75" rx="2" fill="#1a1a1a"/>
    <rect x="150" y="22" width="10" height="71" rx="1" fill="#ffd740"/>
    <!-- Eraser top -->
    <rect x="150" y="22" width="10" height="12" rx="2" fill="#ffaaaa"/>
    <rect x="150" y="34" width="10" height="3" fill="#1a1a1a"/>
    <!-- Pencil tip -->
    <polygon points="148,93 162,93 155,110" fill="#f5deb3" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round"/>
    <polygon points="152,100 158,100 155,110" fill="#1a1a1a"/>
  </g>

  <!-- Star sparkle -->
  <g transform="translate(28, 42)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
