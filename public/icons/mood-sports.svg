<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="skinGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffcc99"/>
      <stop offset="100%" stop-color="#e89060"/>
    </radialGradient>
  </defs>

  <!-- Speed lines background -->
  <g stroke="#ddeeff" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <line x1="8" y1="70" x2="38" y2="70"/>
    <line x1="5" y1="90" x2="32" y2="90"/>
    <line x1="8" y1="110" x2="35" y2="110"/>
    <line x1="10" y1="130" x2="30" y2="130"/>
  </g>

  <!-- Running figure -->
  <!-- Head -->
  <circle cx="128" cy="42" r="22" fill="#1a1a1a"/>
  <circle cx="128" cy="42" r="19" fill="url(#skinGrad)"/>
  <!-- Hair -->
  <path d="M110 35 Q115 18 128 20 Q141 18 146 35 Q140 25 128 26 Q116 25 110 35 Z" fill="#3a1a00"/>
  <!-- Face -->
  <circle cx="121" cy="40" r="3" fill="#1a1a1a"/>
  <circle cx="135" cy="40" r="3" fill="#1a1a1a"/>
  <path d="M121 51 Q128 57 135 51" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Sweat drop -->
  <path d="M148 28 Q151 22 154 28 Q154 34 148 34 Z" fill="#88ccff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Shirt (torso) - running pose leaning forward -->
  <path d="M100 68 Q108 62 128 64 Q148 62 155 70 Q158 85 150 100 Q140 108 118 106 Q98 104 95 90 Z" fill="#1a1a1a"/>
  <path d="M102 70 Q110 64 128 66 Q146 64 153 72 Q156 86 148 100 Q138 108 118 106 Q100 104 97 91 Z" fill="#3399ff"/>
  <!-- Shirt stripe -->
  <path d="M108 72 Q128 70 148 74" stroke="rgba(255,255,255,0.5)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Left arm (forward, pumping) -->
  <path d="M102 72 Q88 78 76 68 Q72 60 78 56" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M102 72 Q88 78 76 68 Q72 60 78 56" stroke="url(#skinGrad)" stroke-width="9" stroke-linecap="round" fill="none"/>
  <!-- Left fist -->
  <circle cx="78" cy="56" r="9" fill="#1a1a1a"/>
  <circle cx="78" cy="56" r="7" fill="url(#skinGrad)"/>

  <!-- Right arm (back) -->
  <path d="M150 72 Q162 85 168 98 Q170 106 164 110" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M150 72 Q162 85 168 98 Q170 106 164 110" stroke="url(#skinGrad)" stroke-width="9" stroke-linecap="round" fill="none"/>
  <circle cx="164" cy="110" r="9" fill="#1a1a1a"/>
  <circle cx="164" cy="110" r="7" fill="url(#skinGrad)"/>

  <!-- Left leg (forward kick) -->
  <path d="M108 105 Q100 125 88 138 Q82 148 90 155" stroke="#1a1a1a" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M108 105 Q100 125 88 138 Q82 148 90 155" stroke="#222244" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Left shoe -->
  <ellipse cx="92" cy="157" rx="18" ry="9" fill="#1a1a1a" transform="rotate(-20 92 157)"/>
  <ellipse cx="94" cy="156" rx="15" ry="7" fill="#ff4444" transform="rotate(-20 94 156)"/>
  <ellipse cx="90" cy="153" rx="7" ry="3" fill="rgba(255,255,255,0.3)" transform="rotate(-20 90 153)"/>

  <!-- Right leg (back, bent) -->
  <path d="M128 105 Q138 120 145 135 Q150 148 142 158" stroke="#1a1a1a" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M128 105 Q138 120 145 135 Q150 148 142 158" stroke="#222244" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Right shoe -->
  <ellipse cx="144" cy="160" rx="18" ry="9" fill="#1a1a1a" transform="rotate(15 144 160)"/>
  <ellipse cx="145" cy="159" rx="15" ry="7" fill="#ff4444" transform="rotate(15 145 159)"/>
  <ellipse cx="141" cy="156" rx="7" ry="3" fill="rgba(255,255,255,0.3)" transform="rotate(15 141 156)"/>

  <!-- Motion lines from body -->
  <g stroke="#aaccff" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <line x1="88" y1="80" x2="68" y2="80"/>
    <line x1="86" y1="92" x2="64" y2="92"/>
  </g>
</svg>
