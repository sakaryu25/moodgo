<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="lensGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6699ff"/>
      <stop offset="50%" stop-color="#3366cc"/>
      <stop offset="100%" stop-color="#1133aa"/>
    </radialGradient>
    <radialGradient id="lensShine" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Camera body outline -->
  <rect x="18" y="70" width="164" height="110" rx="18" fill="#1a1a1a"/>
  <!-- Camera body fill -->
  <rect x="21" y="73" width="158" height="104" rx="16" fill="#2a2a2a"/>
  <rect x="21" y="73" width="158" height="104" rx="16" fill="url(#bodyGrad)" opacity="0.0"/>

  <!-- Body color: dark gray with slight blue -->
  <rect x="22" y="74" width="156" height="102" rx="15" fill="#383838"/>
  <!-- Top highlight stripe -->
  <rect x="22" y="74" width="156" height="28" rx="15" fill="#484848"/>
  <rect x="22" y="88" width="156" height="14" rx="0" fill="#484848"/>

  <!-- Viewfinder bump on top -->
  <rect x="60" y="48" width="80" height="30" rx="10" fill="#1a1a1a"/>
  <rect x="63" y="51" width="74" height="24" rx="8" fill="#333"/>

  <!-- Shutter button -->
  <circle cx="148" cy="63" r="14" fill="#1a1a1a"/>
  <circle cx="148" cy="63" r="11" fill="#cc3300"/>
  <circle cx="148" cy="63" r="8" fill="#ee4411"/>
  <ellipse cx="144" cy="59" rx="4" ry="2.5" fill="rgba(255,255,255,0.4)" transform="rotate(-20 144 59)"/>

  <!-- Lens outer ring -->
  <circle cx="100" cy="128" r="48" fill="#1a1a1a"/>
  <circle cx="100" cy="128" r="45" fill="#555"/>
  <circle cx="100" cy="128" r="40" fill="#222"/>
  <!-- Lens glass -->
  <circle cx="100" cy="128" r="34" fill="url(#lensGrad)"/>
  <!-- Lens shine -->
  <circle cx="100" cy="128" r="34" fill="url(#lensShine)"/>
  <!-- Inner ring detail -->
  <circle cx="100" cy="128" r="22" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Center reflection -->
  <circle cx="100" cy="128" r="8" fill="rgba(255,255,255,0.12)"/>
  <!-- Highlight glint -->
  <ellipse cx="88" cy="116" rx="9" ry="6" fill="rgba(255,255,255,0.45)" transform="rotate(-30 88 116)"/>

  <!-- Flash -->
  <rect x="30" y="82" width="20" height="14" rx="4" fill="#1a1a1a"/>
  <rect x="32" y="84" width="16" height="10" rx="3" fill="#ffffcc"/>

  <!-- Sparkle star top-right -->
  <g transform="translate(170, 55)">
    <line x1="0" y1="-11" x2="0" y2="11" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-11" y1="0" x2="11" y2="0" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Small sparkle -->
  <g transform="translate(22, 58)">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
