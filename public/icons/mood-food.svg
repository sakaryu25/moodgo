<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bowlGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#d4a85a"/>
    </radialGradient>
    <radialGradient id="soupGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e8a840"/>
      <stop offset="100%" stop-color="#c07820"/>
    </radialGradient>
  </defs>
  <!-- Bowl body -->
  <ellipse cx="100" cy="135" rx="72" ry="30" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="5"/>
  <path d="M30 105 Q28 165 100 172 Q172 165 170 105 Z" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="4"/>
  <path d="M33 105 Q31 162 100 169 Q169 162 167 105 Z" fill="url(#bowlGrad)"/>
  <!-- Soup surface -->
  <ellipse cx="100" cy="105" rx="67" ry="22" fill="url(#soupGrad)" stroke="#c07820" stroke-width="2"/>
  <!-- Noodles wavy lines -->
  <g stroke="#f0d080" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M55 100 Q65 92 75 100 Q85 108 95 100 Q105 92 115 100 Q125 108 135 100 Q142 95 148 100"/>
    <path d="M58 110 Q68 102 78 110 Q88 118 98 110 Q108 102 118 110 Q128 118 138 110"/>
  </g>
  <!-- Toppings: egg half -->
  <ellipse cx="75" cy="98" rx="16" ry="13" fill="#1a1a1a"/>
  <ellipse cx="75" cy="98" rx="14" ry="11" fill="#fff8e0"/>
  <ellipse cx="75" cy="98" rx="8" ry="7" fill="#f5a623"/>
  <!-- Toppings: nori (seaweed) -->
  <rect x="115" y="88" width="22" height="18" rx="3" fill="#1a4a1a" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="117" y="90" width="18" height="14" rx="2" fill="#2a6a2a"/>
  <!-- Steam wisps -->
  <g stroke="#ddd" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8">
    <path d="M80 82 Q77 74 80 66 Q83 58 80 50"/>
    <path d="M100 78 Q97 70 100 62 Q103 54 100 46"/>
    <path d="M120 82 Q117 74 120 66 Q123 58 120 50"/>
  </g>
  <!-- Bowl rim -->
  <ellipse cx="100" cy="105" rx="67" ry="22" fill="none" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Bowl base -->
  <ellipse cx="100" cy="168" rx="28" ry="8" fill="#c0903a" stroke="#1a1a1a" stroke-width="3"/>
</svg>
