<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#c8f0c0"/>
      <stop offset="100%" stop-color="#a8d8a8"/>
    </radialGradient>
    <radialGradient id="leafGrad" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#6ad46a"/>
      <stop offset="100%" stop-color="#3aaa3a"/>
    </radialGradient>
    <radialGradient id="darkLeafGrad" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#4ab84a"/>
      <stop offset="100%" stop-color="#228822"/>
    </radialGradient>
  </defs>

  <!-- Sun -->
  <circle cx="155" cy="45" r="22" fill="#ffe066" opacity="0.9"/>
  <g stroke="#ffe066" stroke-width="3" stroke-linecap="round" opacity="0.6">
    <line x1="155" y1="15" x2="155" y2="8"/>
    <line x1="178" y1="22" x2="183" y2="17"/>
    <line x1="185" y1="45" x2="192" y2="45"/>
    <line x1="178" y1="68" x2="183" y2="73"/>
    <line x1="132" y1="22" x2="127" y2="17"/>
    <line x1="125" y1="45" x2="118" y2="45"/>
  </g>

  <!-- Mountains / hills in background -->
  <path d="M10 140 Q50 80 90 130 Q110 100 140 130 Q165 95 190 130 L190 180 L10 180 Z" fill="#c5e8b0" opacity="0.6"/>

  <!-- Big tree trunk -->
  <rect x="88" y="125" width="24" height="55" rx="10" fill="#8B5e3c"/>
  <rect x="92" y="125" width="8" height="55" rx="4" fill="#a06838" opacity="0.5"/>

  <!-- Tree canopy - back -->
  <ellipse cx="100" cy="110" rx="50" ry="42" fill="url(#darkLeafGrad)"/>
  <!-- Tree canopy - front -->
  <ellipse cx="100" cy="100" rx="55" ry="46" fill="url(#leafGrad)"/>
  <!-- Highlights -->
  <ellipse cx="84" cy="85" rx="22" ry="18" fill="#8ae87a" opacity="0.45"/>

  <!-- Small leaf accents -->
  <path d="M148 75 Q158 60 168 72 Q160 80 148 75 Z" fill="#5ac85a"/>
  <path d="M30 90 Q38 75 50 88 Q42 96 30 90 Z" fill="#5ac85a"/>

  <!-- Ground / grass -->
  <ellipse cx="100" cy="175" rx="75" ry="12" fill="#7acc6a" opacity="0.6"/>
  <!-- Grass blades -->
  <path d="M55 168 Q52 155 58 162" stroke="#5ab84a" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M62 165 Q58 150 65 158" stroke="#5ab84a" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M140 168 Q137 153 143 160" stroke="#5ab84a" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M148 165 Q144 150 151 158" stroke="#5ab84a" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Flower -->
  <circle cx="40" cy="158" r="5" fill="#ffdd44"/>
  <circle cx="40" cy="150" r="4" fill="#ff9999"/>
  <circle cx="47" cy="153" r="4" fill="#ff9999"/>
  <circle cx="47" cy="161" r="4" fill="#ff9999"/>
  <circle cx="33" cy="161" r="4" fill="#ff9999"/>
  <circle cx="33" cy="153" r="4" fill="#ff9999"/>
  <rect x="39" y="158" width="2" height="12" rx="1" fill="#6a9a50"/>

  <!-- Bird (simple) -->
  <path d="M35 55 Q42 50 48 55" stroke="#4a6a3a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M52 52 Q59 47 65 52" stroke="#4a6a3a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
