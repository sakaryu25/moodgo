<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="starGrad" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="40%" stop-color="#ffd600"/>
      <stop offset="100%" stop-color="#f9a800"/>
    </radialGradient>
    <radialGradient id="starShine" cx="38%" cy="28%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Star shape with thick black outline -->
  <path d="M100 18 L121 75 L182 75 L133 110 L152 167 L100 133 L48 167 L67 110 L18 75 L79 75 Z"
        fill="#1a1a1a" stroke="#1a1a1a" stroke-width="6" stroke-linejoin="round"/>
  <!-- Star fill -->
  <path d="M100 18 L121 75 L182 75 L133 110 L152 167 L100 133 L48 167 L67 110 L18 75 L79 75 Z"
        fill="url(#starGrad)"/>
  <!-- Shine overlay -->
  <path d="M100 18 L121 75 L182 75 L133 110 L152 167 L100 133 L48 167 L67 110 L18 75 L79 75 Z"
        fill="url(#starShine)"/>
  <!-- Highlight gloss on upper left -->
  <ellipse cx="72" cy="72" rx="20" ry="12" fill="rgba(255,255,255,0.45)" transform="rotate(-30 72 72)"/>

  <!-- Sparkle top-right -->
  <g transform="translate(162, 30)">
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#fff9c4" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#fff9c4" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Sparkle bottom-left (smaller) -->
  <g transform="translate(30, 158)">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#fff9c4" stroke-width="2" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#fff9c4" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
