<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="faceGrad" cx="42%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffe0b2"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </radialGradient>
    <radialGradient id="cheekGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaaaa"/>
      <stop offset="100%" stop-color="#ff8080"/>
    </radialGradient>
  </defs>
  <!-- Face circle outline -->
  <circle cx="100" cy="105" r="78" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Face fill -->
  <circle cx="100" cy="105" r="75" fill="url(#faceGrad)"/>
  <!-- Shine -->
  <ellipse cx="76" cy="76" rx="22" ry="14" fill="rgba(255,255,255,0.4)" transform="rotate(-25 76 76)"/>

  <!-- Closed happy eyes (curved lines) -->
  <path d="M68 95 Q76 87 84 95" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M116 95 Q124 87 132 95" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Relaxed smile -->
  <path d="M72 122 Q100 142 128 122" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Blush cheeks -->
  <ellipse cx="66" cy="118" rx="14" ry="9" fill="url(#cheekGrad)" opacity="0.7"/>
  <ellipse cx="134" cy="118" rx="14" ry="9" fill="url(#cheekGrad)" opacity="0.7"/>

  <!-- Small sparkles around face -->
  <g fill="#ffd700" stroke="#1a1a1a" stroke-width="1.5">
    <polygon points="28,48 32,60 44,60 34,67 38,79 28,72 18,79 22,67 12,60 24,60" transform="scale(0.55) translate(18,28)"/>
    <polygon points="28,48 32,60 44,60 34,67 38,79 28,72 18,79 22,67 12,60 24,60" transform="scale(0.4) translate(350,20)"/>
    <polygon points="28,48 32,60 44,60 34,67 38,79 28,72 18,79 22,67 12,60 24,60" transform="scale(0.35) translate(340,380)"/>
  </g>

  <!-- ZZZ for relaxation -->
  <g font-family="Arial Black" font-weight="900" fill="#8888cc" stroke="#1a1a1a" stroke-width="1" font-size="18">
    <text x="148" y="68">z</text>
    <text x="158" y="50" font-size="22">z</text>
    <text x="170" y="30" font-size="26">Z</text>
  </g>
</svg>
